name: Feature Request

description: Suggest a new feature or enhancement for the BUET E-Library

title: "[Feature] "

labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: "Users can't easily find open-access versions of paywalled articles..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: "Add an 'Unpaywall' integration that shows open-access PDF links..."
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system would this affect?
      options:
        - Elasticsearch / Search
        - Drupal Frontend
        - Microservices (Harvesters)
        - E-Resource Proxy
        - Federated Search
        - Reference Services
        - Institutional Repository
        - Design / UX
        - Documentation
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples
