worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format proxy_log '$remote_addr - $remote_user [$time_local] "$request" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_user_agent"';

    access_log /var/log/nginx/access.log proxy_log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Proxy buffer settings for large database pages
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;
    proxy_temp_file_write_size 64k;

    # Cookie and header handling
    proxy_cookie_domain off;
    proxy_cookie_path off;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;

    # SSL settings for upstream connections
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.html;

        # ─────────────────────────────────────────────────────────────
        # Basic Authentication (required for all proxy access)
        # ─────────────────────────────────────────────────────────────
        auth_basic "BUET Library E-Resource Proxy";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ─────────────────────────────────────────────────────────────
        # Health Check (no auth required)
        # ─────────────────────────────────────────────────────────────
        location /health {
            auth_basic off;
            access_log off;
            return 200 "proxy-healthy\n";
            add_header Content-Type text/plain;
        }

        # ─────────────────────────────────────────────────────────────
        # IEEE Xplore
        # ─────────────────────────────────────────────────────────────
        location /ieee/ {
            proxy_pass https://ieeexplore.ieee.org/;
            proxy_set_header Host ieeexplore.ieee.org;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            proxy_cookie_domain ieeexplore.ieee.org $host;
            proxy_cookie_path / /ieee/;

            # URL rewriting in HTML / CSS / JS
            sub_filter 'https://ieeexplore.ieee.org/' '/ieee/';
            sub_filter 'https://ieeexplore.ieee.org' '/ieee';
            sub_filter 'http://ieeexplore.ieee.org/' '/ieee/';
            sub_filter 'http://ieeexplore.ieee.org' '/ieee';
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;

            proxy_redirect https://ieeexplore.ieee.org/ /ieee/;
            proxy_redirect http://ieeexplore.ieee.org/ /ieee/;
        }

        # ─────────────────────────────────────────────────────────────
        # Elsevier ScienceDirect
        # ─────────────────────────────────────────────────────────────
        location /elsevier/ {
            proxy_pass https://www.sciencedirect.com/;
            proxy_set_header Host www.sciencedirect.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            proxy_cookie_domain .sciencedirect.com $host;
            proxy_cookie_domain www.sciencedirect.com $host;
            proxy_cookie_path / /elsevier/;

            sub_filter 'https://www.sciencedirect.com/' '/elsevier/';
            sub_filter 'https://www.sciencedirect.com' '/elsevier';
            sub_filter 'http://www.sciencedirect.com/' '/elsevier/';
            sub_filter 'http://www.sciencedirect.com' '/elsevier';
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;

            proxy_redirect https://www.sciencedirect.com/ /elsevier/;
            proxy_redirect http://www.sciencedirect.com/ /elsevier/;
        }

        # ─────────────────────────────────────────────────────────────
        # JSTOR
        # ─────────────────────────────────────────────────────────────
        location /jstor/ {
            proxy_pass https://www.jstor.org/;
            proxy_set_header Host www.jstor.org;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            proxy_cookie_domain www.jstor.org $host;
            proxy_cookie_path / /jstor/;

            sub_filter 'https://www.jstor.org/' '/jstor/';
            sub_filter 'https://www.jstor.org' '/jstor';
            sub_filter 'http://www.jstor.org/' '/jstor/';
            sub_filter 'http://www.jstor.org' '/jstor';
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;

            proxy_redirect https://www.jstor.org/ /jstor/;
            proxy_redirect http://www.jstor.org/ /jstor/;
        }

        # ─────────────────────────────────────────────────────────────
        # SpringerLink
        # ─────────────────────────────────────────────────────────────
        location /springer/ {
            proxy_pass https://link.springer.com/;
            proxy_set_header Host link.springer.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            proxy_cookie_domain link.springer.com $host;
            proxy_cookie_path / /springer/;

            sub_filter 'https://link.springer.com/' '/springer/';
            sub_filter 'https://link.springer.com' '/springer';
            sub_filter 'http://link.springer.com/' '/springer/';
            sub_filter 'http://link.springer.com' '/springer';
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;

            proxy_redirect https://link.springer.com/ /springer/;
            proxy_redirect http://link.springer.com/ /springer/;
        }

        # ─────────────────────────────────────────────────────────────
        # Wiley Online Library
        # ─────────────────────────────────────────────────────────────
        location /wiley/ {
            proxy_pass https://onlinelibrary.wiley.com/;
            proxy_set_header Host onlinelibrary.wiley.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            proxy_cookie_domain onlinelibrary.wiley.com $host;
            proxy_cookie_path / /wiley/;

            sub_filter 'https://onlinelibrary.wiley.com/' '/wiley/';
            sub_filter 'https://onlinelibrary.wiley.com' '/wiley';
            sub_filter 'http://onlinelibrary.wiley.com/' '/wiley/';
            sub_filter 'http://onlinelibrary.wiley.com' '/wiley';
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;

            proxy_redirect https://onlinelibrary.wiley.com/ /wiley/;
            proxy_redirect http://onlinelibrary.wiley.com/ /wiley/;
        }

        # ─────────────────────────────────────────────────────────────
        # ACM Digital Library
        # ─────────────────────────────────────────────────────────────
        location /acm/ {
            proxy_pass https://dl.acm.org/;
            proxy_set_header Host dl.acm.org;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            proxy_cookie_domain dl.acm.org $host;
            proxy_cookie_path / /acm/;

            sub_filter 'https://dl.acm.org/' '/acm/';
            sub_filter 'https://dl.acm.org' '/acm';
            sub_filter 'http://dl.acm.org/' '/acm/';
            sub_filter 'http://dl.acm.org' '/acm';
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;

            proxy_redirect https://dl.acm.org/ /acm/;
            proxy_redirect http://dl.acm.org/ /acm/;
        }

        # ─────────────────────────────────────────────────────────────
        # Default landing page (info when user hits root)
        # ─────────────────────────────────────────────────────────────
        location / {
            auth_basic off;
            return 200 '
BUET Library E-Resource Proxy
═══════════════════════════════════════════════════════

Available Databases:
  /ieee/       - IEEE Xplore Digital Library
  /elsevier/   - Elsevier ScienceDirect
  /jstor/      - JSTOR Digital Library
  /springer/   - SpringerLink
  /wiley/      - Wiley Online Library
  /acm/        - ACM Digital Library

Usage: https://proxy.buet.ac.bd:8080/ieee/
═══════════════════════════════════════════════════════
            ';
            add_header Content-Type text/plain;
        }
    }
}
